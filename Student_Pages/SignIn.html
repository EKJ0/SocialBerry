<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SocialBerry — Log in or Sign up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="auth-page">
  <div class="auth-card">
  <div class="auth-shell">
    <aside class="auth-side" aria-label="Account type">
      <nav class="auth-tabs" role="tablist" aria-label="Log in or sign up">
        <button type="button" class="auth-tab is-active" role="tab" aria-selected="true" aria-controls="panel-login" id="tab-login" data-mode="login">
          Log In
        </button>
        <button type="button" class="auth-tab" role="tab" aria-selected="false" aria-controls="panel-signup" id="tab-signup" data-mode="signup">
          Sign Up
        </button>
      </nav>
    </aside>

    <main class="auth-main">
      <a class="auth-brand" href="#" aria-label="SocialBerry home">
        <img
          class="auth-logo-img"
          src="../Images/e6d91739-84fb-407d-a8da-8a46f0387844.jpg"
          alt="SocialBerry"
          width="180"
          height="72"
          decoding="async"
        />
        <span class="auth-tagline">Don't just scroll — experience.</span>
      </a>

      <div class="auth-panels auth-panels--login" id="auth-panels">
      <section class="auth-panel" id="panel-login" role="tabpanel" aria-labelledby="tab-login" aria-hidden="false">
        <div class="auth-avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="8" r="4" stroke="white" stroke-width="2" />
            <path d="M5 21c1.5-5 4.5-7 7-7s5.5 2 7 7" stroke="white" stroke-width="2" stroke-linecap="round" />
          </svg>
        </div>
        <form id="form-login" class="auth-form" action="#" method="post" novalidate>
          <div class="auth-field">
            <label class="visually-hidden" for="login-username">Username</label>
            <input id="login-username" name="username" type="text" autocomplete="username" placeholder="Username..." required />
          </div>
          <div class="auth-field">
            <label class="visually-hidden" for="login-password">Password</label>
            <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="Password" required />
          </div>
          <div class="auth-row">
            <a class="auth-link" href="#">Forgot password?</a>
          </div>
          <button type="submit" class="auth-submit">Log In</button>
        </form>
      </section>

      <section class="auth-panel" id="panel-signup" role="tabpanel" aria-labelledby="tab-signup" aria-hidden="true">
        <div class="auth-avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="8" r="4" stroke="white" stroke-width="2" />
            <path d="M5 21c1.5-5 4.5-7 7-7s5.5 2 7 7" stroke="white" stroke-width="2" stroke-linecap="round" />
          </svg>
        </div>
        <form id="form-signup" class="auth-form" action="#" method="post" novalidate>
          <div class="auth-field">
            <label class="visually-hidden" for="signup-username">Username</label>
            <input id="signup-username" name="username" type="text" autocomplete="username" placeholder="Username..." required />
          </div>
          <div class="auth-field">
            <label class="visually-hidden" for="signup-password">Password</label>
            <input id="signup-password" name="password" type="password" autocomplete="new-password" placeholder="Password" required />
          </div>
          <div class="auth-field">
            <label for="signup-password-confirm">Confirm password</label>
            <input id="signup-password-confirm" name="password_confirm" type="password" autocomplete="new-password" placeholder="Password" required />
          </div>
          <div class="auth-field">
            <div
              id="student-id-drop"
              class="auth-drop"
              role="button"
              tabindex="0"
              aria-label="Upload student ID. Drag and drop a file or click to browse."
            >
              <p class="auth-drop-title">Drag and drop</p>
              <p class="auth-drop-hint">Drop your student ID to confirm you are a student.</p>
              <input id="student-id-file" type="file" accept="image/*,.pdf" />
              <p class="auth-drop-file" id="student-id-filename"></p>
            </div>
          </div>
          <p id="signup-msg" class="auth-msg" role="status" aria-live="polite"></p>
          <button type="submit" class="auth-submit">Sign Up</button>
        </form>
      </section>
      </div>
    </main>
  </div>
  </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
